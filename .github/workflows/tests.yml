name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Unit tests, type checks, coverage, and complexity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Check types with mypy strict
        run: python -m mypy

      - name: Check types with pyright strict
        run: python -m pyright

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Run coverage
        run: python -m coverage run -m unittest

      - name: Report coverage
        run: python -m coverage report

      - name: Generate coverage XML
        run: python -m coverage xml

      - name: Check cyclomatic complexity
        run: |
          python -m radon cc socSteuerung.py -s -a
          python scripts/check_radon_a.py

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: true
